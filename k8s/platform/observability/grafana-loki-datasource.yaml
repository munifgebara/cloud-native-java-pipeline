apiVersion: v1
kind: ConfigMap
metadata:
  name: stella-loki-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
    app.kubernetes.io/name: stella-loki-datasource
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: stella
data:
  stella-loki-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Stella Loki
        uid: stella-loki
        type: loki
        access: proxy
        url: http://loki.logging.svc.cluster.local:3100
        isDefault: false
        editable: false
