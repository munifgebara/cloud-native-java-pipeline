apiVersion: v1
kind: ConfigMap
metadata:
  name: stella-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: stella-logs-dashboard
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: stella
data:
  stella-logs.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {
              "type": "grafana",
              "uid": "-- Grafana --"
            },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "stella-loki"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "stella-loki"
              },
              "editorMode": "builder",
              "expr": "{namespace=\"platform\", app=\"stella-api\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Stella API - logs recentes",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "stella-loki"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 2,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "stella-loki"
              },
              "editorMode": "code",
              "expr": "{namespace=\"platform\", app=\"stella-api\"} | json | log_level=\"ERROR\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Stella API - erros",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "stella-loki"
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 3,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "stella-loki"
              },
              "editorMode": "code",
              "expr": "{namespace=\"platform\", app=\"stella-api\"} |~ \"/api/v0/(itens-mestre/imagem-ia|ia/cadastro-foto/sugestoes)\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Endpoints de IA",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "stella-loki"
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "stella-loki"
              },
              "editorMode": "code",
              "expr": "{namespace=\"platform\", pod=~\"keycloak.*|postgres.*|minio.*|stella-embeddings.*\"}",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Dependencias da plataforma",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "stella",
        "logs"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Stella Logs",
      "uid": "stella-logs",
      "version": 1,
      "weekStart": ""
    }
