apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: platform
data:
  KC_DB: postgres
  KC_DB_URL: jdbc:postgresql://postgres.platform.svc.cluster.local:5432/keycloak
  KC_DB_USERNAME: keycloak
  KC_PROXY_HEADERS: xforwarded
  KC_HTTP_ENABLED: "true"
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"


