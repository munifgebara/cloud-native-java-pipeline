apiVersion: v1
data:
  stella-realm.json: |
    {
      "id": "stella",
      "realm": "stella",
      "displayName": "Stella",
      "enabled": true,
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "duplicateEmailsAllowed": false,
      "resetPasswordAllowed": true,
      "editUsernameAllowed": false,
      "bruteForceProtected": true,
      "sslRequired": "external",
      "defaultRoles": [
        "usuario"
      ],
      "roles": {
        "realm": [
          {
            "name": "admin",
            "description": "Administrador do sistema Stella"
          },
          {
            "name": "proprietario",
            "description": "Proprietário dos itens cadastrados"
          },
          {
            "name": "usuario",
            "description": "Usuário com acesso de consulta"
          }
        ]
      },
      "clients": [
        {
          "clientId": "stella-api",
          "name": "Stella API (Resource Server)",
          "protocol": "openid-connect",
          "enabled": true,
          "bearerOnly": true,
          "publicClient": false,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false
        },
        {
          "clientId": "stella-api-admin",
          "name": "Stella API Admin Integration",
          "protocol": "openid-connect",
          "enabled": true,
          "publicClient": false,
          "secret": "${STELLA_KEYCLOAK_ADMIN_CLIENT_SECRET}",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": true
        },
        {
          "clientId": "stella-cli",
          "name": "Stella CLI (Dev/Test)",
          "protocol": "openid-connect",
          "enabled": true,
          "publicClient": true,
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "http://localhost:4200/auth/callback",
            "http://127.0.0.1:4200/auth/callback",
            "http://localhost:8080/app/auth/callback",
            "http://127.0.0.1:8080/app/auth/callback",
            "https://stella.gebaralabs.dev/app/auth/callback"
          ],
          "webOrigins": [
            "http://localhost:4200",
            "http://127.0.0.1:4200",
            "http://localhost:8080",
            "http://127.0.0.1:8080",
            "https://stella.gebaralabs.dev"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256"
          },
          "protocolMappers": [
            {
              "name": "picture",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "consentRequired": false,
              "config": {
                "user.attribute": "picture",
                "claim.name": "picture",
                "jsonType.label": "String",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "identityProviders": [
        {
          "alias": "google",
          "displayName": "Google",
          "providerId": "google",
          "enabled": true,
          "trustEmail": true,
          "storeToken": false,
          "addReadTokenRoleOnCreate": false,
          "authenticateByDefault": false,
          "linkOnly": false,
          "firstBrokerLoginFlowAlias": "first broker login",
          "config": {
            "clientId": "${STELLA_GOOGLE_CLIENT_ID}",
            "clientSecret": "${STELLA_GOOGLE_CLIENT_SECRET}",
            "syncMode": "IMPORT"
          }
        },
        {
          "alias": "github",
          "displayName": "GitHub",
          "providerId": "github",
          "enabled": true,
          "trustEmail": true,
          "storeToken": false,
          "addReadTokenRoleOnCreate": false,
          "authenticateByDefault": false,
          "linkOnly": false,
          "firstBrokerLoginFlowAlias": "first broker login",
          "config": {
            "clientId": "${STELLA_GITHUB_CLIENT_ID}",
            "clientSecret": "${STELLA_GITHUB_CLIENT_SECRET}",
            "syncMode": "IMPORT"
          }
        }
      ],
      "identityProviderMappers": [
        {
          "name": "google-picture",
          "identityProviderAlias": "google",
          "identityProviderMapper": "oidc-user-attribute-idp-mapper",
          "config": {
            "claim": "picture",
            "user.attribute": "picture",
            "syncMode": "INHERIT"
          }
        },
        {
          "name": "github-avatar",
          "identityProviderAlias": "github",
          "identityProviderMapper": "oidc-user-attribute-idp-mapper",
          "config": {
            "claim": "avatar_url",
            "user.attribute": "picture",
            "syncMode": "INHERIT"
          }
        }
      ],
      "users": [
        {
          "username": "service-account-stella-api-admin",
          "enabled": true,
          "serviceAccountClientId": "stella-api-admin",
          "clientRoles": {
            "realm-management": [
              "manage-users",
              "query-users",
              "view-realm",
              "view-users"
            ]
          }
        },
        {
          "username": "admin",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Admin",
          "lastName": "Stella",
          "email": "admin@example.local",
          "credentials": [
            {
              "type": "password",
              "value": "admin123",
              "temporary": false
            }
          ],
          "realmRoles": [
            "admin"
          ]
        },
        {
          "username": "proprietario1",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Proprietario",
          "lastName": "Demo",
          "email": "proprietario1@example.local",
          "credentials": [
            {
              "type": "password",
              "value": "demo123",
              "temporary": false
            }
          ],
          "realmRoles": [
            "proprietario"
          ]
        },
        {
          "username": "usuario1",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Usuario",
          "lastName": "Demo",
          "email": "usuario1@example.local",
          "credentials": [
            {
              "type": "password",
              "value": "demo123",
              "temporary": false
            }
          ],
          "realmRoles": [
            "usuario"
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: platform
