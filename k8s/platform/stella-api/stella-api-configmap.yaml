apiVersion: v1
kind: ConfigMap
metadata:
  name: stella-api-config
  namespace: platform
data:
  STELLA_DATASOURCE_URL: jdbc:postgresql://postgres.platform.svc.cluster.local:5432/stella_dev
  STELLA_DATASOURCE_USERNAME: stella
  STELLA_KEYCLOAK_BASE_URL: http://keycloak.platform.svc.cluster.local:8080
  STELLA_KEYCLOAK_ISSUER_URL: https://keycloak.gebaralabs.dev/realms/stella
  STELLA_KEYCLOAK_JWK_SET_URL: http://keycloak.platform.svc.cluster.local:8080/realms/stella/protocol/openid-connect/certs
  STELLA_KEYCLOAK_REALM: stella
  STELLA_KEYCLOAK_PUBLIC_CLIENT_ID: stella-cli
  STELLA_KEYCLOAK_ADMIN_REALM: stella
  STELLA_KEYCLOAK_ADMIN_CLIENT_ID: stella-api-admin
  SPRING_PROFILES_ACTIVE: server
  STELLA_ENVIRONMENT: production
  STELLA_LOG_LEVEL: INFO
  STELLA_SECURITY_LOG_LEVEL: INFO
  STELLA_CORS_ALLOWED_ORIGIN_1: http://127.0.0.1:4200
  STELLA_CORS_ALLOWED_ORIGIN_2: http://localhost:4200
  STELLA_MINIO_ENDPOINT: http://minio.platform.svc.cluster.local:9000
  STELLA_MINIO_BUCKET: stella-itens
  STELLA_MINIO_MAX_IMAGE_SIZE_BYTES: "5242880"
  STELLA_VECTOR_SEARCH_ENABLED: "true"
  STELLA_EMBEDDINGS_PROVIDER: local
  STELLA_EMBEDDINGS_BASE_URL: http://stella-embeddings:8000
  STELLA_EMBEDDINGS_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  STELLA_EMBEDDINGS_DIMENSIONS: "384"
  AI_ENABLED: "true"
  OPENAI_MAX_IMAGES_PER_DAY: "20"
  OPENAI_MAX_GENERATIONS_PER_DAY: "20"
  OPENAI_MAX_EMBEDDINGS_PER_DAY: "200"
  STELLA_OPENAI_IMAGE_MODEL: gpt-image-1
  STELLA_OPENAI_IMAGE_SIZE: 1024x1024
  STELLA_OPENAI_IMAGE_QUALITY: low
  STELLA_OPENAI_IMAGE_OUTPUT_FORMAT: png
