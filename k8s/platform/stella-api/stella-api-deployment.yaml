apiVersion: apps/v1
kind: Deployment
metadata:
  name: stella-api
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stella-api
  template:
    metadata:
      labels:
        app: stella-api
        app.kubernetes.io/name: stella-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: stella
        observability.stella/log-format: ecs
      annotations:
        observability.stella/log-destination: grafana
        observability.stella/log-collector: stdout
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: stella-api
          image: ghcr.io/munifgebara/stella-api:main
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: stella-api-config
          env:
            - name: STELLA_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: stella-api-secret
                  key: STELLA_DATASOURCE_PASSWORD
            - name: STELLA_KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stella-api-secret
                  key: STELLA_KEYCLOAK_ADMIN_CLIENT_SECRET
            - name: STELLA_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: STELLA_MINIO_ACCESS_KEY
            - name: STELLA_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: STELLA_MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 5
