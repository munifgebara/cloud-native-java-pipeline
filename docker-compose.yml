name: stella

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: stella-postgres
    environment:
      POSTGRES_USER: ${STELLA_POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${STELLA_POSTGRES_SUPERPASSWORD:-postgres}
      POSTGRES_DB: ${STELLA_POSTGRES_SUPERDB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${STELLA_POSTGRES_SUPERUSER:-postgres} -d ${STELLA_POSTGRES_SUPERDB:-postgres}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - stella-net

  keycloak:
    image: keycloak/keycloak:26.5.5
    container_name: stella-keycloak
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Admin inicial
      KEYCLOAK_ADMIN: ${STELLA_KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${STELLA_KEYCLOAK_ADMIN_PASSWORD:-admin}

      # Banco (Postgres)
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${STELLA_KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${STELLA_KEYCLOAK_DB_PASSWORD:-keycloak}

      # Ajustes úteis para dev/local
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      STELLA_KEYCLOAK_ADMIN_CLIENT_SECRET: ${STELLA_KEYCLOAK_ADMIN_CLIENT_SECRET:-local-stella-api-admin-secret}

    # Import automático de realm (opcional).
    # Se você colocar um JSON em ./keycloak/realm, o Keycloak importa ao subir.
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import:ro

    command:
      - start-dev
      - --import-realm

    ports:
      - "9080:8080"
    networks:
      - stella-net

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: stella-minio
    environment:
      MINIO_ROOT_USER: ${STELLA_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STELLA_MINIO_SECRET_KEY:-minioadmin}
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - stella-net

  rabbitmq:
    image: rabbitmq:4.1-management-alpine
    container_name: stella-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${STELLA_RABBITMQ_USERNAME:-stella}
      RABBITMQ_DEFAULT_PASS: ${STELLA_RABBITMQ_PASSWORD:-stella}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - stella-net

volumes:
  pgdata:
  miniodata:
  rabbitmqdata:

networks:
  stella-net:
    driver: bridge
