<div class="login-page">
  <div class="login-language">
    <app-language-selector />
  </div>

  <p-card [header]="'app.name' | translate">
    <p class="login-text">
      {{ 'login.access' | translate }}
    </p>

    <div class="login-form">
      <div class="field">
        <label for="username">{{ 'login.username' | translate }}</label>
        <input
          pInputText
          id="username"
          type="text"
          [(ngModel)]="username"
          [placeholder]="'login.usernamePlaceholder' | translate" />
      </div>

      <div class="field">
        <label for="password">{{ 'login.password' | translate }}</label>
        <p-password
          id="password"
          [(ngModel)]="password"
          [feedback]="false"
          [toggleMask]="true"
          [placeholder]="'login.passwordPlaceholder' | translate"
          styleClass="w-full">
        </p-password>
      </div>

      @if (errorMessage()) {
        <div class="error-message">
          {{ errorMessage() }}
        </div>
      }

      <p-button
        [label]="'login.submit' | translate"
        icon="pi pi-sign-in"
        [loading]="loading()"
        (onClick)="entrar()">
      </p-button>

      <div class="login-divider">
        <span>{{ 'login.or' | translate }}</span>
      </div>

      <div class="social-actions">
        <p-button
          [label]="'login.google' | translate"
          icon="pi pi-google"
          severity="secondary"
          [loading]="socialLoading() === 'google'"
          (onClick)="entrarCom('google')">
        </p-button>

        <p-button
          [label]="'login.github' | translate"
          icon="pi pi-github"
          severity="secondary"
          [loading]="socialLoading() === 'github'"
          (onClick)="entrarCom('github')">
        </p-button>
      </div>
    </div>
  </p-card>
</div>
