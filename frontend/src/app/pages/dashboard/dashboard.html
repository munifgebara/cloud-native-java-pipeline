<div class="dashboard-page">
  <h1>{{ 'dashboard.title' | translate }}</h1>
  <p class="subtitle">{{ 'dashboard.subtitle' | translate }}</p>

  @if (loading()) {
    <div class="state-card">
      {{ 'dashboard.loading' | translate }}
    </div>
  } @else if (errorMessage()) {
    <div class="state-card error">
      {{ errorMessage() }}
    </div>
  } @else {
    <div class="cards">
      <p-card [header]="'dashboard.peopleCount' | translate">
        <a class="metric-link" routerLink="/pessoas" [attr.aria-label]="'dashboard.peopleListAria' | translate">
          <div class="metric-value">
            {{ resumo()?.quantidadePessoas ?? 0 }}
          </div>
          <span class="metric-caption">{{ 'dashboard.openPeople' | translate }}</span>
        </a>
      </p-card>
    </div>
  }
</div>
