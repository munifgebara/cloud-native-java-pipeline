<div class="page">
  <p-confirmdialog />

  <div class="page-header">
    <div>
      <h2>{{ 'people.title' | translate }}</h2>
      <p>{{ 'people.subtitle' | translate }}</p>
    </div>

    <button
      pButton
      type="button"
      [label]="'common.new' | translate"
      icon="pi pi-plus"
      (click)="novo()">
    </button>
  </div>

  <div class="toolbar">
    <input
      pInputText
      type="text"
      [(ngModel)]="filtroNome"
      [placeholder]="'people.searchByName' | translate"
      (keyup.enter)="pesquisar()" />

    <button
      pButton
      type="button"
      [label]="'common.search' | translate"
      icon="pi pi-search"
      (click)="pesquisar()">
    </button>

    <button
      pButton
      type="button"
      severity="secondary"
      [label]="'common.clear' | translate"
      icon="pi pi-times"
      (click)="filtroNome=''; carregar()">
    </button>
  </div>

  @if (errorMessage()) {
    <div class="error-box">
      {{ errorMessage() }}
    </div>
  }

  <p-table
    styleClass="responsive-table"
    [value]="pessoas()"
    [loading]="loading()"
    [tableStyle]="{ 'min-width': '60rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>{{ 'common.name' | translate }}</th>
        <th style="width: 220px;">{{ 'common.actions' | translate }}</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-pessoa>
      <tr>
        <td [attr.data-label]="'common.name' | translate">{{ pessoa.nome }}</td>
        <td [attr.data-label]="'common.actions' | translate">
          <div class="actions">
            <button
              pButton
              type="button"
              severity="secondary"
              text
              icon="pi pi-pencil"
              [label]="'common.edit' | translate"
              [routerLink]="['/pessoas', pessoa.id, 'editar']">
            </button>

            <button
              pButton
              type="button"
              severity="danger"
              text
              icon="pi pi-trash"
              [label]="'people.delete' | translate"
              [loading]="deletingId() === pessoa.id"
              [disabled]="loading() || deletingId() !== null"
              (click)="confirmarExclusao(pessoa)">
            </button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
