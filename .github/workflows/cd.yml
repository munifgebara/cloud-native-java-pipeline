name: CD - Deploy to k3s

on:
  workflow_run:
    workflows:
      - Publish Stella API Image
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Aplicar manifests base
        run: |
          sed -i \
            "s|image: ghcr.io/munifgebara/stella-api:main|image: ghcr.io/munifgebara/stella-api:${{ github.event.workflow_run.head_sha }}|" \
            k8s/platform/stella-api/stella-api-deployment.yaml
          sudo k3s kubectl apply -R -f k8s/platform/

      - name: Ver imagem aplicada
        run: |
          sudo k3s kubectl get deployment stella-api -n platform -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo

      - name: Aguardar rollout
        run: |
          sudo k3s kubectl rollout status deployment/stella-api -n platform --timeout=420s

      - name: Diagnóstico em caso de falha
        if: failure()
        run: |
          sudo k3s kubectl get deployment stella-api -n platform -o wide
          sudo k3s kubectl get pods -n platform -o wide
          sudo k3s kubectl describe deployment stella-api -n platform
          sudo k3s kubectl get events -n platform --sort-by=.lastTimestamp | tail -80

          NEW_RS="$(sudo k3s kubectl get replicasets -n platform \
            -l app=stella-api \
            --sort-by=.metadata.creationTimestamp \
            -o jsonpath='{.items[-1:].metadata.name}')"
          POD_HASH="$(sudo k3s kubectl get replicaset "$NEW_RS" -n platform \
            -o jsonpath='{.metadata.labels.pod-template-hash}')"

          echo "ReplicaSet novo: $NEW_RS"
          sudo k3s kubectl describe replicaset "$NEW_RS" -n platform

          for pod in $(sudo k3s kubectl get pods -n platform \
            -l "app=stella-api,pod-template-hash=$POD_HASH" \
            -o name); do
            echo "Diagnóstico de $pod"
            sudo k3s kubectl describe -n platform "$pod"
            sudo k3s kubectl logs -n platform "$pod" --all-containers=true --tail=200 || true
            sudo k3s kubectl logs -n platform "$pod" --all-containers=true --previous --tail=200 || true
          done
