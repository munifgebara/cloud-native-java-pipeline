name: CD - Deploy to k3s

on:
  workflow_run:
    workflows:
      - Publish Stella API Image
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: self-hosted

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Aplicar manifests base
        run: |
          sudo k3s kubectl apply -R -f k8s/platform/

      - name: Atualizar imagem para a SHA publicada
        run: |
          sudo k3s kubectl set image deployment/stella-api \
            stella-api=ghcr.io/munifgebara/stella-api:${{ github.event.workflow_run.head_sha }} \
            -n platform

      - name: Ver imagem aplicada
        run: |
          sudo k3s kubectl get deployment stella-api -n platform -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo

      - name: Aguardar rollout
        run: |
          sudo k3s kubectl rollout status deployment/stella-api -n platform --timeout=180s
