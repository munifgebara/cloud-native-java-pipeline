server:
  port: 8080

spring:
  application:
    name: stella-api
  servlet:
    multipart:
      max-file-size: ${STELLA_MAX_FILE_SIZE:5MB}
      max-request-size: ${STELLA_MAX_REQUEST_SIZE:5MB}

  datasource:
    url: ${STELLA_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/stella}
    username: ${STELLA_DATASOURCE_USERNAME:stella}
    password: ${STELLA_DATASOURCE_PASSWORD:stella}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: public

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${STELLA_OPENAI_MODEL:gpt-4.1-mini}
      image:
        options:
          model: ${STELLA_OPENAI_IMAGE_MODEL:gpt-image-1}
          size: ${STELLA_OPENAI_IMAGE_SIZE:1024x1024}
          quality: ${STELLA_OPENAI_IMAGE_QUALITY:low}
          response-format: b64_json
      embedding:
        enabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${stella.keycloak.base-url}/realms/${stella.keycloak.realm}

stella:
  cors:
    allowed-origins:
      - ${STELLA_CORS_ALLOWED_ORIGIN_1:http://127.0.0.1:4200}
      - ${STELLA_CORS_ALLOWED_ORIGIN_2:http://localhost:4200}
  keycloak:
    base-url: ${STELLA_KEYCLOAK_BASE_URL:http://127.0.0.1:9080}
    realm: ${STELLA_KEYCLOAK_REALM:stella}
    public-client-id: ${STELLA_KEYCLOAK_PUBLIC_CLIENT_ID:stella-cli}
    admin-realm: ${STELLA_KEYCLOAK_ADMIN_REALM:master}
    admin-client-id: ${STELLA_KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${STELLA_KEYCLOAK_ADMIN_USERNAME:admin}
    admin-password: ${STELLA_KEYCLOAK_ADMIN_PASSWORD:admin}
    admin-client-secret: ${STELLA_KEYCLOAK_ADMIN_CLIENT_SECRET:}
  minio:
    endpoint: ${STELLA_MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${STELLA_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${STELLA_MINIO_SECRET_KEY:minioadmin}
    bucket: ${STELLA_MINIO_BUCKET:stella-itens}
    max-image-size-bytes: ${STELLA_MINIO_MAX_IMAGE_SIZE_BYTES:5242880}
  vector-search:
    enabled: ${STELLA_VECTOR_SEARCH_ENABLED:false}
    min-similarity: ${STELLA_VECTOR_SEARCH_MIN_SIMILARITY:0.20}
    max-results: ${STELLA_VECTOR_SEARCH_MAX_RESULTS:12}
  embeddings:
    provider: ${STELLA_EMBEDDINGS_PROVIDER:local}
    base-url: ${STELLA_EMBEDDINGS_BASE_URL:http://stella-embeddings:8000}
    model: ${STELLA_EMBEDDINGS_MODEL:sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
    dimensions: ${STELLA_EMBEDDINGS_DIMENSIONS:384}

ai:
  enabled: ${AI_ENABLED:true}

openai:
  max-images-per-day: ${OPENAI_MAX_IMAGES_PER_DAY:-1}
  max-generations-per-day: ${OPENAI_MAX_GENERATIONS_PER_DAY:-1}
  max-embeddings-per-day: ${OPENAI_MAX_EMBEDDINGS_PER_DAY:-1}

management:
  endpoints:
    access:
      default: unrestricted
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      access: read-only
    prometheus:
      access: read-only
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: ${STELLA_LOG_LEVEL:INFO}
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

springdoc:
  api-docs:
    path: /v3/api-docs

scalar:
  enabled: true
  path: /scalar
  url: /v3/api-docs
  theme: deep_space
  layout: modern
  darkMode: true
