spring:
  datasource:
    url: jdbc:h2:mem:stella_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  sql:
    init:
      mode: always
      data-locations: classpath:db/testdata/pessoa.sql

  h2:
    console:
      enabled: false

  ai:
    openai:
      api-key: test-key-nao-usada-em-testes
      embedding:
        enabled: false

stella:
  vector-search:
    enabled: false
  embeddings:
    provider: local
    base-url: http://127.0.0.1:9999
    model: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
    dimensions: 384
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: stella-test
    max-image-size-bytes: 5242880

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn
